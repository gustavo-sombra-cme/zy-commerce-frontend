<section class="auth-page">
  <zy-page-header title="Create account" subtitle="Start shopping with ZippyYum." />

  @if (errorMessage()) {
    <p class="auth-alert error">{{ errorMessage() }}</p>
  }

  <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
    <label class="form-field">
      <span>Display name</span>
      <input type="text" autocomplete="name" formControlName="displayName">
    </label>

    <label class="form-field">
      <span>Email</span>
      <input type="email" autocomplete="email" formControlName="email">
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <small class="field-error">Enter a valid email address.</small>
      }
    </label>

    <label class="form-field">
      <span>Password</span>
      <input type="password" autocomplete="new-password" formControlName="password">
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <small class="field-error">Use at least 8 characters.</small>
      }
    </label>

    <button class="primary-button" type="submit" [disabled]="form.invalid || submitting()">
      {{ submitting() ? 'Creating account...' : 'Create account' }}
    </button>

    <p class="auth-link">Already have an account? <a routerLink="/auth/login">Sign in</a></p>
  </form>
</section>
