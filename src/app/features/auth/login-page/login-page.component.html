<section class="auth-page">
  <zy-page-header title="Sign in" subtitle="Welcome back." />

  @if (registeredMessage()) {
    <p class="auth-alert success">Account created. Sign in to continue.</p>
  }

  @if (errorMessage()) {
    <p class="auth-alert error">{{ errorMessage() }}</p>
  }

  <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
    <label class="form-field">
      <span>Email</span>
      <input type="email" autocomplete="email" formControlName="email">
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <small class="field-error">Enter a valid email address.</small>
      }
    </label>

    <label class="form-field">
      <span>Password</span>
      <input type="password" autocomplete="current-password" formControlName="password">
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <small class="field-error">Password is required.</small>
      }
    </label>

    <button class="primary-button" type="submit" [disabled]="form.invalid || submitting()">
      {{ submitting() ? 'Signing in...' : 'Sign in' }}
    </button>

    <p class="auth-link">New here? <a routerLink="/auth/register">Create an account</a></p>
  </form>
</section>
