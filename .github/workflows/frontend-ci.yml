name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --no-watch --no-progress

      - name: Audit production dependencies
        run: npm audit --omit=dev
